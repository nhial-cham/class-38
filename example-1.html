<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CSS Animations & Transitions</title>
    <link rel="stylesheet" href="./example-1.css"/>
</head>

<body>
    <main class="container">

        <header class="header">
            <h1>CSS Motion Basics</h1>
            <p>Transitions vs Animations</p>
        </header>

        <section class="section">
            <h2>Transitions (User Interaction)</h2>

            <div class="cards">
                <div class="card transition-scale">Hover me</div>
                <div class="card transition-color">Hover me</div>
                <div class="card transition-move">Hover me</div>
            </div>
        </section>

        <section class="section">
            <h2>Animations (Automatic)</h2>

            <div class="cards">
                <div class="card animate-fade">Fade</div>
                <div class="card animate-bounce">Bounce</div>
                <div class="card animate-rotate">Rotate</div>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 Motion UI Demo</p>
        </footer>

    </main>
</body>

</html>
